<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #ff4e78;
            color: white;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ff1e56;
            transform: scale(1.05);
        }

        .hidden-message {
            margin-top: 20px;
            font-size: 1.2rem;
            display: none;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: red;
            transform: rotate(45deg);
            animation: float 6s infinite ease-in;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            left: -10px;
            top: 0;
        }

        @keyframes float {
            0% {
                bottom: -10px;
                opacity: 1;
                transform: translateX(0) rotate(45deg);
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: translateX(100px) rotate(45deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Valentine's Day ❤️ <br>
        Sharmila Devi</h1>
        <p>You make my world brighter, sweeter, and full of love.</p>
        <button onclick="showMessage()">Click for a Surprise 💌</button>
        <div class="hidden-message" id="message">
            💖 I love you more than words can express! 💖
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').style.display = 'block';
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.background = randomColor();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        function randomColor() {
            const colors = ['#ff4e78', '#ff6f91', '#ff8fab', '#ffb3c6'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
